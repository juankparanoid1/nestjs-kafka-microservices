services:
  distributed-nest-db:
    image: postgres:16
    container_name: distributed-nest-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345
      - POSTGRES_DB=distributed-nest-db
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - distributed-nest-db-data:/var/lib/postgresql/data

  payment-service-nest:
    build: ./payment-service
    container_name: payment-service-nest
    restart: always
    ports:
      - "9080:8080"
    depends_on:
      distributed-nest-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=jdbc:postgresql://distributed-nest-db:5432/distributed-nest-db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=12345
      - PORT=8081
      # - SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=60000
      # - SPRING_KAFKA_SERVER=http://localhost:9094
      # - SPRING_KAFKA_GROUP_ID=payment-group
      # - SPRING_KAFKA_DEFAULT_TOPIC=payment.events

  order-service-nest:
    build: ./order-service
    container_name: order-service-nest
    restart: always
    ports:
      - "9081:8081"
    depends_on:
      distributed-nest-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=jdbc:postgresql://distributed-nest-db:5432/distributed-nest-db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=12345
      # - SPRING_PORT=8081
      # - SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=60000
      # - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka-service-nest:9092
      # - SPRING_KAFKA_DEFAULT_TOPIC=orders.events

  kafka-service-nest:
    container_name: kafka-service-nest
    image: apache/kafka:latest
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      ############################################
      # KRaft Metadata & Node Identity
      ############################################
      # Unique ID for this Kafka node
      KAFKA_NODE_ID: 1
      # Unique Kafka cluster identifier (required for KRaft mode)
      KAFKA_CLUSTER_ID: 'order-system-cluster-1'
      # Node roles — this instance will act as BOTH a broker and controller
      KAFKA_PROCESS_ROLES: 'broker,controller'

      ############################################
      # Controller Quorum Configuration (Raft)
      ############################################
      # List of controller nodes that form the Raft quorum
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-service-nest:9093'
      # Listener name used by controllers for internal Raft communication
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      ############################################
      # Network Listeners (Internal, External & Controller)
      ############################################
      # Define all listener endpoints for this Kafka node
      # PLAINTEXT containers Docker ↔ Kafka
      # EXTERNAL local machine / IDEA
      KAFKA_LISTENERS: >
        PLAINTEXT://0.0.0.0:9092,
        EXTERNAL://0.0.0.0:9094,
        CONTROLLER://0.0.0.0:9093

      # What each listener advertises to connecting clients
      # Internal (Docker containers): kafka-service-nest:9092
      # External (host machine): localhost:9094
      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://kafka-service-nest:9092,
        EXTERNAL://localhost:9094

      # Maps listener names to their security protocols
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        CONTROLLER:PLAINTEXT,
        PLAINTEXT:PLAINTEXT,
        EXTERNAL:PLAINTEXT

      # Which listener brokers should use for internal communication
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

      ############################################
      #  Single-Node Cluster Safety Settings
      #    (because replication >1 would break)
      ############################################
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      ############################################
      #  Broker Defaults & Quality-of-Life Settings
      ############################################
      # Speed up consumer group startup
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Auto-create topics if they don't already exist
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      # Default number of partitions per topic
      KAFKA_NUM_PARTITIONS: 1

    volumes:
      - ./docker/kafka_data:/var/lib/kafka/data

  kafka-event-nest-ui:
    container_name: kafka-event-nest-ui
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - "8070:8080"
    depends_on:
      - kafka-service-nest
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-service-nest:9092  # Use internal Docker network name
      DYNAMIC_CONFIG_ENABLED: 'true'
    restart: unless-stopped

volumes:
  distributed-nest-db-data:


